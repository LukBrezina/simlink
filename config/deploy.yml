# Kamal deploy config for SimLink. Host-specific values come from .env
# (copy .env.example → .env). Deploy: bin/kamal setup (first time) / bin/kamal deploy.

service: simlink
image: simlink

servers:
  web:
    # Where Kamal SSHes to deploy. Defaults to APP_HOST; set SIMLINK_SSH_HOST in
    # .env when the public host isn't reachable on port 22 (e.g. behind a
    # Cloudflare proxy — use the origin IP — or a Tailscale name).
    - <%= ENV["SIMLINK_SSH_HOST"].presence || ENV["APP_HOST"] %>

# kamal-proxy terminates TLS (Let's Encrypt) and lets several apps share the box.
# Requires config.assume_ssl + config.force_ssl in production.rb (already on).
proxy:
  ssl: true
  host: <%= ENV["APP_HOST"] %>

# Local registry on the server. Unauthenticated. Point KAMAL_REGISTRY_SERVER at a
# hosted registry (Docker Hub / GHCR) in .env if you prefer one.
registry:
  server: <%= ENV["KAMAL_REGISTRY_SERVER"].presence || "localhost:5555" %>

# Server is amd64; this Mac is arm64, so cross-build (buildx/emulation).
builder:
  arch: amd64
  # Build from the working dir (not a fresh git clone) so the gitignored, on-disk
  # downloads/simlink.apk is baked into the image and served at /download/simlink.apk.
  # Kamal does a clean git-clone build only when `context` is unset.
  context: "."

env:
  clear:
    SOLID_QUEUE_IN_PUMA: true   # run jobs inside Puma (no separate job host)
    APP_HOST: <%= ENV["APP_HOST"] %>   # mailer link host (config/environments/production.rb)
  secret:
    - RAILS_MASTER_KEY
    - AR_ENCRYPTION_PRIMARY_KEY
    - AR_ENCRYPTION_DETERMINISTIC_KEY
    - AR_ENCRYPTION_KEY_DERIVATION_SALT
    # Google service-account JSON for FCM push (content-free wakes). Set in
    # .env (FCM_SERVICE_ACCOUNT_JSON) → .kamal/secrets. See app/services/fcm.rb.
    - FCM_SERVICE_ACCOUNT_JSON

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# SQLite databases live here — a named volume persists them across deploys.
# BACK THIS UP.
volumes:
  - "simlink_storage:/rails/storage"

asset_path: /rails/public/assets
